name: Django CI / CD

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
    
env:
  PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

jobs:
  
  build:
    runs-on: self-hosted
    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    env:
      SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      DEBUG: "1"
      DB_NAME: test_db
      DB_USER: postgres
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_HOST: 127.0.0.1
      DB_PORT: 5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Docker is accessible
        run: |
          which docker
          docker --version
          docker compose version

      - name: Start PostgreSQL container
        run: |
          docker run -d \
            --name pg_test_${{ matrix.python-version }} \
            -e POSTGRES_DB=test_db \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }} \
            -p 5432:5432 \
            postgres:15

          echo "Waiting for postgres..."
          until docker exec pg_test_${{ matrix.python-version }} \
            pg_isready -U postgres; do
            sleep 2
          done
          echo "Postgres is ready"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests
        run: python manage.py test --verbosity=2

      - name: Stop and remove PostgreSQL container
        if: always()
        run: docker rm -f pg_test_${{ matrix.python-version }}

  deploy:
    runs-on: self-hosted
    needs: build
    if: github.event_name == 'push'

    env:
      SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      DEBUG: "0"
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Copy .env into workspace
        run: cp /home/ubuntu/BoltTrip/bolttrip/.env $GITHUB_WORKSPACE/.env

      - name: Rebuild Docker image
        run: docker compose build

      - name: Start containers
        run: docker compose up -d --remove-orphans

      - name: Run migrations
        run: docker compose exec -T web python manage.py migrate --noinput

      - name: Collect static files
        run: docker compose exec -T web python manage.py collectstatic --noinput

      - name: Clean up old Docker images
        run: docker image prune -f

      - name: Health check
        run: |
          sleep 5
          curl --fail http://localhost/health/ \
            && echo "App is up" \
            || echo "Health endpoint not configured — skipping"
