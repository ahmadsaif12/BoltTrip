name: Django CI (Docker)

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Create env file (FULL for postgres + django)
      - name: Create .env file
        run: |
          echo "SECRET_KEY=test" >> bolttrip/.env
          echo "DEBUG=1" >> bolttrip/.env
          echo "POSTGRES_DB=postgres" >> bolttrip/.env
          echo "POSTGRES_USER=postgres" >> bolttrip/.env
          echo "POSTGRES_PASSWORD=postgres" >> bolttrip/.env
          echo "DB_NAME=postgres" >> bolttrip/.env
          echo "DB_USER=postgres" >> bolttrip/.env
          echo "DB_PASSWORD=postgres" >> bolttrip/.env
          echo "DB_HOST=db" >> bolttrip/.env
          echo "DB_PORT=5432" >> bolttrip/.env

      # ✅ Build only web (skip celery)
      - name: Build web container
        working-directory: bolttrip
        run: docker compose build web

      # ✅ Start required services
      - name: Start services
        working-directory: bolttrip
        run: docker compose up -d web db redis

      # ✅ Wait until Postgres is REALLY ready (important fix)
      - name: Wait for database
        working-directory: bolttrip
        run: |
          echo "Waiting for postgres..."
          until docker compose exec -T db pg_isready -U postgres; do
            sleep 2
          done
          echo "Postgres is ready!"

      # ✅ Debug (optional but helpful)
      - name: Show containers
        working-directory: bolttrip
        run: docker compose ps

      # ✅ Run migrations
      - name: Run migrations
        working-directory: bolttrip
        run: docker compose exec -T web python manage.py migrate --noinput

      # ✅ Run tests
      - name: Run tests
        working-directory: bolttrip
        run: docker compose exec -T web python manage.py test --verbosity=2

      # ✅ Always cleanup
      - name: Stop containers
        if: always()
        working-directory: bolttrip
        run: docker compose down
