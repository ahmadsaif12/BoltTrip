name: Django CI (Docker)

on:
  push:
    branches:
      - master   

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug project structure
        run: ls -R

      - name: Create .env file
        run: |
          echo "SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}" >> bolttrip/.env
          echo "DEBUG=1" >> bolttrip/.env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> bolttrip/.env
          echo "DB_USER=${{ secrets.DB_USER }}" >> bolttrip/.env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> bolttrip/.env
          echo "DB_HOST=db" >> bolttrip/.env
          echo "DB_PORT=5432" >> bolttrip/.env

      - name: Build containers
        working-directory: bolttrip
        run: docker compose build

      - name: Start containers
        working-directory: bolttrip
        run: docker compose up -d

      - name: Wait for DB
        run: sleep 10

      - name: Run migrations
        working-directory: bolttrip
        run: docker compose exec -T web python manage.py migrate --noinput

      - name: Run tests
        working-directory: bolttrip
        run: docker compose exec -T web python manage.py test

      - name: Stop containers
        if: always()
        working-directory: bolttrip
        run: docker compose down
