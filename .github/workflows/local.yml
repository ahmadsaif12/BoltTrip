name: CiCd

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "SECRET_KEY=test" >> bolttrip/.env
          echo "DEBUG=1" >> bolttrip/.env
          echo "POSTGRES_DB=bolttrip" >> bolttrip/.env
          echo "POSTGRES_USER=postgres" >> bolttrip/.env
          echo "POSTGRES_PASSWORD=postgres" >> bolttrip/.env
          echo "POSTGRES_HOST=db" >> bolttrip/.env
          echo "POSTGRES_PORT=5432" >> bolttrip/.env
          echo "REDIS_URL=redis://redis:6379/0" >> bolttrip/.env
          echo "CELERY_BROKER_URL=redis://redis:6379/0" >> bolttrip/.env
          echo "CELERY_RESULT_BACKEND=redis://redis:6379/0" >> bolttrip/.env

      - name: Build web container
        working-directory: bolttrip
        run: docker compose build web

      - name: Start services
        working-directory: bolttrip
        run: docker compose up -d web db redis

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            if docker compose exec db pg_isready -U postgres > /dev/null 2>&1; then
              break
            fi
            sleep 2
          done

      - name: Run migrations
        working-directory: bolttrip
        run: docker compose exec -T web python manage.py migrate --noinput

      - name: Run tests
        working-directory: bolttrip
        run: docker compose exec -T web python manage.py test

      - name: Stop containers
        if: always()
        working-directory: bolttrip
        run: docker compose down
